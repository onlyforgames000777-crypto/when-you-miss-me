<!DOCTYPE html>
<html>
<head>
<title>📸 Our Little Gallery 🩵✨</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:30px;
font-family:Georgia,serif;

background:
linear-gradient(
135deg,
#ffd6e8,
#fff0f5,
#dbeafe,
#fef9c3
);

text-align:center;
}

h1{
color:#6b21a8;
margin-bottom:30px;
}

.gallery{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;

}

.polaroid{

background:white;

padding:15px 15px 40px;

width:280px;

border-radius:15px;

box-shadow:
0 10px 25px rgba(0,0,0,.15);

transition:.3s;

}

.polaroid:hover{

transform:
rotate(-2deg)
scale(1.04);

}

.polaroid img{

width:100%;
height:300px;

object-fit:cover;

border-radius:10px;

}

.caption{

margin-top:15px;

font-size:18px;

color:#444;

}

button{

margin-top:40px;

padding:15px 30px;

border:none;

border-radius:20px;

font-size:18px;

cursor:pointer;

background:#7dd3fc;

font-weight:bold;

}

</style>
</head>

<body>

<h1>
📸 Favourite Memories 🩵✨🌹💐🌺🌷💝💖
</h1>

<div class="gallery">

<div class="polaroid">
<img src="IMG-20260529-WA0001.jpg">
<div class="caption">
🌹 My Favourite Smile 🥺🫶🏻🩵✨
</div>
</div>

<div class="polaroid">
<img src="IMG-20260529-WA0018.jpg">
<div class="caption">
💖 The Prettiest Person Ever 🥹💝✨
</div>
</div>

<div class="polaroid">
<img src="IMG-20260529-WA0023.jpg">
<div class="caption">
🌷 A Little Piece Of Happiness 🩵💞✨
</div>
</div>

</div>

<button onclick="nextPage()">
💌 Open My Letter 🫶🏻🩵✨
</button>

<script>

function nextPage(){

window.location.href=
"letter.html";

}

</script>

</body>
</html>
