<!DOCTYPE html>
<html>
<head>
<title>🌙 Open This When You Miss Me...</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#312e81,
#0f172a
);

}

.star{
position:absolute;
font-size:18px;
animation:twinkle 3s infinite;
}

@keyframes twinkle{

0%,100%{
opacity:.2;
}

50%{
opacity:1;
}

}

.moon{

position:absolute;

top:60px;
right:70px;

font-size:90px;

filter:
drop-shadow(0 0 20px white);

animation:
float 4s ease-in-out infinite;

}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

.box{

width:90%;
max-width:550px;

padding:40px;

background:
rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

text-align:center;

color:white;

box-shadow:
0 0 30px rgba(255,255,255,.15);

}

h1{

margin-bottom:20px;

}

p{

line-height:1.8;

margin-bottom:20px;

}

input{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:16px;

margin-top:15px;

}

button{

margin-top:20px;

padding:15px 30px;

border:none;

border-radius:20px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:#7dd3fc;

}

.footer{

margin-top:20px;

opacity:.9;

}

</style>
</head>

<body>

<div class="moon">🌙</div>

<div class="box">

<h1>
🌙 Open This When You Miss Me... 🩵✨
</h1>

<p>

Syeda Shezaa 🥺🫶🏻🩵✨🥹🌹💐🌺🌷💝💖
